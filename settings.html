<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Designo - Settings</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="d-flex">
        <div id="sidebar-container"></div>

        <div class="main-content w-100">
            <div id="navbar-container"></div>

            <div class="mb-4">
                <h2 class="fw-bold mb-1" style="color: #1a1a1a;">Account Settings</h2>
                <p class="text-muted mb-0">Manage your profile details and notification preferences.</p>
            </div>

            <div class="row g-4">
                <div class="col-xl-8">
                    <div class="card border-0 shadow-sm rounded-4">
                        <div class="card-body p-4 pb-5">
                            <h6 class="fw-bold border-bottom pb-3 mb-4">Profile Information</h6>

                            <div id="settings-alert" class="alert alert-success d-none d-flex align-items-center gap-2"
                                role="alert">
                                <i class="bi bi-check-circle-fill"></i>
                                <div>Settings saved successfully!</div>
                            </div>

                            <form id="settingsForm">
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label fw-medium small text-muted">First Name</label>
                                        <input type="text" id="firstName" class="form-control" value="Harsh" required>
                                        <div class="invalid-feedback">Please enter your first name.</div>
                                    </div>
                                    <div class="col-md-6 mt-3 mt-md-0">
                                        <label class="form-label fw-medium small text-muted">Last Name</label>
                                        <input type="text" id="lastName" class="form-control" value="Student" required>
                                        <div class="invalid-feedback">Please enter your last name.</div>
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <label class="form-label fw-medium small text-muted">Email Address</label>
                                    <input type="email" id="emailAddress" class="form-control" value="harsh@designo.com"
                                        required>
                                    <div class="invalid-feedback">Please enter a valid email address.</div>
                                </div>

                                <h6 class="fw-bold border-bottom pb-3 mb-4 mt-5">Change Password</h6>

                                <div class="mb-3">
                                    <label class="form-label fw-medium small text-muted">Current Password</label>
                                    <input type="password" id="currentPassword" class="form-control"
                                        placeholder="••••••••">
                                </div>
                                <div class="row mb-4">
                                    <div class="col-md-6">
                                        <label class="form-label fw-medium small text-muted">New Password</label>
                                        <input type="password" id="newPassword" class="form-control"
                                            placeholder="••••••••">
                                    </div>
                                    <div class="col-md-6 mt-3 mt-md-0">
                                        <label class="form-label fw-medium small text-muted">Confirm New
                                            Password</label>
                                        <input type="password" id="confirmPassword" class="form-control"
                                            placeholder="••••••••">
                                        <div class="invalid-feedback" id="passwordError">Passwords do not match.</div>
                                    </div>
                                </div>

                                <div class="d-flex justify-content-end gap-3 mt-4">
                                    <button type="button" class="btn btn-light fw-medium px-4">Cancel</button>
                                    <button type="submit" class="btn btn-brand fw-medium px-4">Save Changes</button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="col-xl-4">
                    <div class="card border-0 shadow-sm rounded-4 mb-4 text-center">
                        <div class="card-body p-4">
                            <img src="https://ui-avatars.com/api/?name=Harsh&background=random"
                                class="rounded-circle mb-3 shadow-sm" width="100" height="100" alt="Profile Picture">
                            <h5 class="fw-bold mb-1">Harsh</h5>
                            <p class="text-muted small mb-3">Admin Workspace</p>
                            <button class="btn btn-outline-orange w-100 fw-semibold">Change Avatar</button>
                        </div>
                    </div>

                    <div class="card border-0 shadow-sm rounded-4">
                        <div class="card-body p-4">
                            <h6 class="fw-bold border-bottom pb-3 mb-4">Notifications</h6>

                            <div
                                class="form-check form-switch d-flex justify-content-between align-items-center mb-3 ps-0">
                                <label class="form-check-label fw-medium text-dark" for="emailNotif">Email
                                    Updates</label>
                                <input class="form-check-input ms-0 mt-0" type="checkbox" role="switch" id="emailNotif"
                                    checked>
                            </div>

                            <div
                                class="form-check form-switch d-flex justify-content-between align-items-center mb-3 ps-0">
                                <label class="form-check-label fw-medium text-dark" for="smsNotif">SMS Alerts</label>
                                <input class="form-check-input ms-0 mt-0" type="checkbox" role="switch" id="smsNotif">
                            </div>

                            <div class="form-check form-switch d-flex justify-content-between align-items-center ps-0">
                                <label class="form-check-label fw-medium text-dark" for="weeklyReport">Weekly Analytics
                                    Report</label>
                                <input class="form-check-input ms-0 mt-0" type="checkbox" role="switch"
                                    id="weeklyReport" checked>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/components.js"></script>

    <script>
        // 1. Initialize layout
        loadComponents('nav-settings');

        $(document).ready(function () {
            // Change Avatar Mock Logic
            $('button:contains("Change Avatar")').on('click', function () {
                $('<input type="file" accept="image/*">').on('change', function () {
                    alert("Avatar uploaded successfully! (Simulated)");
                }).click();
            });

            // 2. Custom Form Validation Logic
            $('#settingsForm').on('submit', function (e) {
                e.preventDefault();
                let isValid = true;

                // Clear previous error states
                $('.form-control').removeClass('is-invalid');

                // Validate Basic Info
                if ($('#firstName').val().trim() === '') { $('#firstName').addClass('is-invalid'); isValid = false; }
                if ($('#lastName').val().trim() === '') { $('#lastName').addClass('is-invalid'); isValid = false; }

                const email = $('#emailAddress').val();
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) { $('#emailAddress').addClass('is-invalid'); isValid = false; }

                // ==========================================
                // PASSWORD VERIFICATION SIMULATOR
                // ==========================================
                const currentPass = $('#currentPassword').val();
                const newPass = $('#newPassword').val();
                const confirmPass = $('#confirmPassword').val();

                // This acts as our fake database password for testing
                const mockDatabasePassword = "password123";

                // If the user typed ANYTHING in any password field, trigger validation
                if (currentPass !== '' || newPass !== '' || confirmPass !== '') {

                    // 1. Check if they know the current password
                    if (currentPass !== mockDatabasePassword) {
                        $('#currentPassword').addClass('is-invalid');
                        alert("Incorrect current password. (Hint: try 'password123')");
                        isValid = false;
                    }
                    // 2. Check if they actually typed a new password
                    else if (newPass === '') {
                        $('#newPassword').addClass('is-invalid');
                        isValid = false;
                    }
                    // 3. Check if the new passwords match
                    else if (newPass !== confirmPass) {
                        $('#confirmPassword').addClass('is-invalid');
                        $('#passwordError').text("Passwords do not match.");
                        isValid = false;
                    }
                }

                // If everything is good, show the success alert
                if (isValid) {
                    $('#settings-alert').removeClass('d-none').hide().fadeIn();
                    $('#currentPassword, #newPassword, #confirmPassword').val(''); // Clear inputs

                    setTimeout(() => {
                        $('#settings-alert').fadeOut(function () {
                            $(this).addClass('d-none');
                        });
                    }, 3000);
                }
            });
        });
    </script>

</body>

</html>
