<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Designo - User Management</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="d-flex">
        <div id="sidebar-container"></div>

        <div class="main-content w-100">
            <div id="navbar-container"></div>

            <div class="mb-4 d-flex justify-content-between align-items-end">
                <div>
                    <h2 class="fw-bold mb-1" style="color: #1a1a1a;">User Management</h2>
                    <p class="text-muted mb-0">View, edit, and manage system users.</p>
                </div>
                <button class="btn btn-brand px-4 py-2 fw-semibold d-flex align-items-center gap-2"
                    data-bs-toggle="modal" data-bs-target="#addUserModal">
                    <i class="bi bi-plus-lg"></i> Add User
                </button>
            </div>

            <div class="card border-0 shadow-sm rounded-4 mb-4 mt-2">
                <div class="card-body p-4">

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <div class="search-wrapper" style="width: 320px;">
                            <i class="bi bi-search"></i>
                            <input type="text" id="table-search" class="form-control"
                                placeholder="Search by name or email...">
                        </div>
                        <button class="btn btn-white border fw-semibold d-flex align-items-center gap-2"
                            style="color: var(--text-main);">
                            <i class="bi bi-funnel"></i> Filter Users
                        </button>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-custom mb-0">
                            <thead>
                                <tr>
                                    <th>User ID</th>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Role</th>
                                    <th>Status</th>
                                    <th class="text-end">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="user-table-body">
                                <tr>
                                    <td class="text-muted fw-medium">#1001</td>
                                    <td>
                                        <div class="d-flex align-items-center gap-3">
                                            <img src="https://ui-avatars.com/api/?name=Jane+Doe&background=random"
                                                class="rounded-circle" width="36" height="36" alt="Jane">
                                            <span class="fw-semibold">Jane Doe</span>
                                        </div>
                                    </td>
                                    <td class="text-muted">jane.doe@example.com</td>
                                    <td class="fw-medium">Admin</td>
                                    <td><span class="badge-active">Active</span></td>
                                    <td class="text-end">
                                        <button class="action-btn px-2"><i class="bi bi-pencil-square"></i></button>
                                        <button class="action-btn px-2"><i class="bi bi-trash"></i></button>
                                    </td>
                                </tr>

                                <tr>
                                    <td class="text-muted fw-medium">#1002</td>
                                    <td>
                                        <div class="d-flex align-items-center gap-3">
                                            <img src="https://ui-avatars.com/api/?name=John+Smith&background=random"
                                                class="rounded-circle" width="36" height="36" alt="John">
                                            <span class="fw-semibold">John Smith</span>
                                        </div>
                                    </td>
                                    <td class="text-muted">john.smith@example.com</td>
                                    <td class="fw-medium">Editor</td>
                                    <td><span class="badge-inactive">Inactive</span></td>
                                    <td class="text-end">
                                        <button class="action-btn px-2"><i class="bi bi-pencil-square"></i></button>
                                        <button class="action-btn px-2"><i class="bi bi-trash"></i></button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mt-4 pt-2 border-top">
                        <span class="text-muted small">Showing 1 to 2 of 2 entries</span>
                        <div class="d-flex gap-2">
                            <button class="btn btn-sm btn-light border">Previous</button>
                            <button class="btn btn-sm btn-brand text-white">1</button>
                            <button class="btn btn-sm btn-light border">Next</button>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <div class="modal fade" id="addUserModal" tabindex="-1" aria-labelledby="addUserModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow" style="border-radius: 16px;">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title fw-bold" id="addUserModalLabel">Add New User</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body py-4">
                    <form id="addUserForm">
                        <div class="mb-3">
                            <label class="form-label fw-medium small text-muted">Full Name</label>
                            <input type="text" class="form-control" placeholder="e.g. Jane Doe" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-medium small text-muted">Email Address</label>
                            <input type="email" class="form-control" placeholder="jane@example.com" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-medium small text-muted">Role</label>
                                <select class="form-select">
                                    <option>Admin</option>
                                    <option>Editor</option>
                                    <option>Viewer</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-medium small text-muted">Status</label>
                                <select class="form-select">
                                    <option>Active</option>
                                    <option>Inactive</option>
                                </select>
                            </div>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-top-0 pt-0">
                    <button type="button" class="btn btn-light fw-medium" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-brand fw-medium">Save User</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="js/components.js"></script>

    <script>
        // Initialize modular components and set layout nav
        loadComponents('nav-users');

        $(document).ready(function () {

            // ==================================================
            // 1. FULL API CRUD INTEGRATION (JSONPlaceholder)
            // ==================================================

            // Helper arrays for missing dummy data fields
            const rolesPool = ['Admin', 'Editor', 'Viewer'];
            const statusPool = ['Active', 'Inactive'];

            // --- GET: Fetch Initial Users ---
            function fetchSystemUsers() {
                $('#user-table-body').html(`
                    <tr>
                        <td colspan="6" class="text-center py-5">
                            <div class="spinner-border text-brand" style="color: var(--brand-orange);" role="status"></div>
                            <p class="text-muted mt-2 small fw-medium">Connecting to remote database...</p>
                        </td>
                    </tr>
                `);

                fetch('https://jsonplaceholder.typicode.com/users')
                    .then(response => {
                        if (!response.ok) throw new Error('Network error received');
                        return response.json();
                    })
                    .then(usersData => {
                        $('#user-table-body').empty();

                        // Limit to 6 entries for a clean dashboard UI
                        const cleanDataset = usersData.slice(0, 6);

                        cleanDataset.forEach((user, index) => {
                            const currentRole = rolesPool[index % 3];
                            const currentStatus = statusPool[index % 2];
                            appendUserToTable(user.id, user.name, user.email, currentRole, currentStatus, false);
                        });

                        updateEntryCounter();
                    })
                    .catch(err => {
                        console.error("GET Error:", err);
                        $('#user-table-body').html('<tr><td colspan="6" class="text-center text-danger py-4">API connection failed. Please check network.</td></tr>');
                    });
            }

            // --- POST: Create New User ---
            $('#btnSaveUser').on('click', function (e) {
                e.preventDefault();

                const targetName = $('#newUserName').val().trim();
                const targetEmail = $('#newUserEmail').val().trim();
                const targetRole = $('#newUserRole').val();
                const targetStatus = $('#newUserStatus').val();

                if (!targetName || !targetEmail) {
                    alert("Validation Error: Name and Email fields are required.");
                    return;
                }

                // Visual feedback during API call
                const originalBtnText = $(this).text();
                $(this).html('<span class="spinner-border spinner-border-sm me-2"></span>Saving...');
                $(this).prop('disabled', true);

                // Simulate sending data to the backend
                fetch('https://jsonplaceholder.typicode.com/users', {
                    method: 'POST',
                    body: JSON.stringify({
                        name: targetName,
                        email: targetEmail
                    }),
                    headers: { 'Content-type': 'application/json; charset=UTF-8' },
                })
                    .then(response => response.json())
                    .then(json => {
                        // JSONPlaceholder returns the new object with an ID (usually 11)
                        // We will add a random multiplier so the IDs look realistic in the UI
                        const newId = json.id + Math.floor(Math.random() * 90);

                        // Add to UI as the newest entry (prepend)
                        appendUserToTable(newId, targetName, targetEmail, targetRole, targetStatus, true);

                        // Cleanup Modal
                        $('#addUserModal').modal('hide');
                        $('#addUserForm')[0].reset();
                        updateEntryCounter();
                    })
                    .catch(err => {
                        console.error("POST Error:", err);
                        alert("Failed to save user to the database.");
                    })
                    .finally(() => {
                        // Restore button state
                        $(this).html(originalBtnText);
                        $(this).prop('disabled', false);
                    });
            });

            // --- DELETE: Remove User ---
            $(document).on('click', '.delete-btn', function () {
                const targetRow = $(this).closest('tr');
                const rawIdText = targetRow.find('td:first').text().replace('#100', ''); // Extract clean ID

                // Visual feedback
                const icon = $(this).find('i');
                icon.removeClass('bi-trash').addClass('spinner-border spinner-border-sm');

                // Simulate backend deletion
                fetch(`https://jsonplaceholder.typicode.com/users/${rawIdText}`, {
                    method: 'DELETE',
                })
                    .then(response => {
                        if (response.ok) {
                            targetRow.fadeOut(300, function () {
                                $(this).remove();
                                updateEntryCounter();
                            });
                        } else {
                            throw new Error('Deletion failed on server');
                        }
                    })
                    .catch(err => {
                        console.error("DELETE Error:", err);
                        alert("Failed to delete user from database.");
                        icon.removeClass('spinner-border spinner-border-sm').addClass('bi-trash');
                    });
            });

            // ==================================================
            // 2. UI RENDER ENGINE & UTILITIES
            // ==================================================

            // Centralized function to inject rows into the DOM
            function appendUserToTable(id, name, email, role, status, isNewEntry) {
                const badgeStyle = status === 'Active' ? 'badge-active' : 'badge-inactive';
                const dynamicAvatar = `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=random`;
                const highlightStyle = isNewEntry ? 'style="background-color: #fffcf9; border-left: 4px solid var(--brand-orange);"' : '';

                const tableRow = `
                    <tr ${highlightStyle}>
                        <td class="text-muted fw-medium">#100${id}</td>
                        <td>
                            <div class="d-flex align-items-center gap-3">
                                <img src="${dynamicAvatar}" class="rounded-circle shadow-sm" width="36" height="36" alt="${name}">
                                <span class="fw-semibold">${name}</span>
                            </div>
                        </td>
                        <td class="text-muted">${email.toLowerCase()}</td>
                        <td class="fw-medium">${role}</td>
                        <td><span class="${badgeStyle}">${status}</span></td>
                        <td class="text-end">
                            <button class="action-btn px-2 edit-btn"><i class="bi bi-pencil-square"></i></button>
                            <button class="action-btn px-2 delete-btn"><i class="bi bi-trash"></i></button>
                        </td>
                    </tr>
                `;

                if (isNewEntry) {
                    $('#user-table-body').prepend(tableRow);
                } else {
                    $('#user-table-body').append(tableRow);
                }
            }

            function updateEntryCounter() {
                const totalRows = $('#user-table-body tr').length;
                $('#table-entries-info').text(`Showing 1 to ${totalRows} of ${totalRows} entries`);
            }

            // Local Search Filter
            $('#table-search').on('keyup', function () {
                const structuralToken = $(this).val().toLowerCase();
                $("#user-table-body tr").filter(function () {
                    $(this).toggle($(this).text().toLowerCase().indexOf(structuralToken) > -1);
                });
            });

            // Edit Button Placeholder
            $(document).on('click', '.edit-btn', function () {
                const targetNode = $(this).closest('tr');
                const contextualIdentity = targetNode.find('span.fw-semibold').text();
                alert(`Action triggered: Edit User API Endpoint\nTarget Entity: ${contextualIdentity}`);
            });

            // Filter Button Placeholder
            $('.bi-funnel').parent().on('click', function (e) {
                e.preventDefault();
                alert("Action triggered: Filter Data\nOpening query parameters...");
            });

            // Initialize the pipeline
            fetchSystemUsers();
        });
    </script>

</body>

</html>
