<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Designo - Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

    <style>
        /* Specific overrides to perfectly center the login card */
        body {
            background-color: var(--bg-body);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .login-card {
            max-width: 420px;
            width: 100%;
        }
    </style>
</head>

<body>

    <div class="card login-card border-0 shadow-sm p-4 rounded-4 bg-white">
        <div class="card-body">

            <div class="text-center mb-4 pb-2">
                <div class="d-flex align-items-center justify-content-center gap-2 mb-3">
                    <i class="bi bi-square-fill fs-2" style="color: var(--brand-orange);"></i>
                    <span class="fw-bold fs-3 text-dark" style="letter-spacing: 0.5px;">DESIGNO</span>
                </div>
                <h5 class="fw-bold text-dark">Welcome back</h5>
                <p class="text-muted small">Please enter your details to sign in.</p>
            </div>

            <div id="login-error" class="alert alert-danger d-none small py-2 d-flex align-items-center gap-2"
                role="alert">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span id="login-error-text">Invalid credentials.</span>
            </div>

            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label fw-medium small text-muted">Email</label>
                    <input type="email" id="loginEmail" class="form-control py-2" placeholder="harsh@designo.com"
                        required>
                    <div class="invalid-feedback">Please enter a valid email address.</div>
                </div>

                <div class="mb-4">
                    <div class="d-flex justify-content-between align-items-center">
                        <label class="form-label fw-medium small text-muted mb-0">Password</label>
                        <a href="#" class="small text-decoration-none"
                            style="color: var(--brand-orange); font-weight: 600;">Forgot password?</a>
                    </div>
                    <div class="input-group mt-2">
                        <input type="password" id="loginPassword" class="form-control py-2" placeholder="••••••••"
                            required>
                        <button class="btn btn-outline-secondary border-start-0 bg-white" type="button"
                            id="togglePassword">
                            <i class="bi bi-eye"></i>
                        </button>
                        <div class="invalid-feedback">Password cannot be empty.</div>
                    </div>
                </div>

                <div class="form-check mb-4">
                    <input class="form-check-input" type="checkbox" id="rememberMe">
                    <label class="form-check-label small text-muted" for="rememberMe">
                        Remember for 30 days
                    </label>
                </div>

                <button type="submit" class="btn btn-brand w-100 py-2 fw-semibold mb-3">Sign In</button>

                <div class="text-center small text-muted">
                    Don't have an account? <a href="#" class="text-decoration-none"
                        style="color: var(--brand-orange); font-weight: 600;">Sign up</a>
                </div>
            </form>

        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script>
        $(document).ready(function () {
            // 1. Toggle Password Visibility
            $('#togglePassword').on('click', function () {
                const passwordInput = $('#loginPassword');
                const icon = $(this).find('i');

                if (passwordInput.attr('type') === 'password') {
                    passwordInput.attr('type', 'text');
                    icon.removeClass('bi-eye').addClass('bi-eye-slash');
                } else {
                    passwordInput.attr('type', 'password');
                    icon.removeClass('bi-eye-slash').addClass('bi-eye');
                }
            });

            // 2. Form Validation & Submission Redirect
            $('#loginForm').on('submit', function (e) {
                e.preventDefault(); // Stop page from reloading immediately
                let isValid = true;

                const email = $('#loginEmail').val().trim();
                const password = $('#loginPassword').val().trim();

                // Clear errors
                $('.form-control').removeClass('is-invalid');
                $('#login-error').addClass('d-none');

                // Validate Email
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                if (!emailRegex.test(email)) {
                    $('#loginEmail').addClass('is-invalid');
                    isValid = false;
                }

                // Validate Password
                if (password === '') {
                    $('#loginPassword').addClass('is-invalid');
                    isValid = false;
                }

                // If passed validation, simulate login
                if (isValid) {
                    // MOCK AUTHENTICATION CHECK
                    if (email === "harsh@designo.com" && password === "123456") {
                        const originalText = $('#loginForm button[type="submit"]').text();
                        $('#loginForm button[type="submit"]').html('<span class="spinner-border spinner-border-sm"></span> Authenticating...');

                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 1000);
                    } else {
                        $('#login-error-text').text("Incorrect email or password. (Hint: use harsh@designo.com / 123456)");
                        $('#login-error').removeClass('d-none');
                    }
                }
            });
        });
    </script>
</body>

</html>
